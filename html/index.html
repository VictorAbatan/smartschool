<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSchool - Home</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/ss-logo-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/index.css">
</head>
<body>

  <!-- Animated background -->
  <div class="landing-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="landing-container">

    <!-- Logo -->
    <div class="landing-logo-wrap">
      <img src="../assets/images/ss-logo-icon.svg" alt="SmartSchool" class="landing-logo">
      <div class="landing-logo-ring"></div>
    </div>

    <!-- Hero -->
    <div class="hero">
      <h1 class="hero-title">Smart<span class="hero-accent">School</span></h1>
      <p class="hero-sub">Effortless Result Management &amp; Student Support</p>
      <div class="hero-divider"></div>
    </div>

    <!-- Role cards -->
    <div class="roles">
      <div class="role-card teacher-card">
        <div class="role-icon-wrap"><span class="role-icon">👨‍🏫</span></div>
        <h2>Teacher</h2>
        <p>Enter scores, generate report cards, manage attendance &amp; assignments</p>
        <div class="role-btns">
          <a href="teacher-login.html" class="role-btn primary">Login</a>
          <a href="teacher-signup.html" class="role-btn secondary">Sign Up</a>
        </div>
      </div>

      <div class="role-card student-card">
        <div class="role-icon-wrap"><span class="role-icon">🎓</span></div>
        <h2>Student</h2>
        <p>View results, download report cards, track attendance &amp; assignments</p>
        <div class="role-btns">
          <a href="student-login.html" class="role-btn primary">Login</a>
          <a href="student-signup.html" class="role-btn secondary">Sign Up</a>
        </div>
      </div>
    </div>

    <a href="admin-signup.html" class="admin-link">🏫 Register as School Admin (Principal)</a>

  </div>

</body>
</html>
